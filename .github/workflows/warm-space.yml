name: Warm Committed Space

# Keeps the Committed inference Spaces warm so visitors never hit a cold start.
#
# Free Hugging Face Spaces sleep after ~48h idle, and a slept Space reloads its
# model weights on the next request (a 30-60s wait for whoever shows up next).
# This job hits BOTH Spaces every 6 hours:
#   1. The FastAPI Space wired to the portfolio (/health + a generation on both sizes).
#   2. The Gradio demo Space (a generation on both sizes via its call API — Gradio
#      warms 1.7b at startup but loads 0.6b lazily, so a plain ping is not enough).
#
# Triggers:
#   - schedule: every 6h. NOTE GitHub only runs scheduled workflows from the
#     DEFAULT branch, so this runs from main. Cron timing is best-effort (GitHub
#     can delay on-the-hour runs under load), so the minute is offset.
#   - workflow_dispatch: a manual "Run workflow" button for on-demand warming.
#
# Both Space URLs are public. Override without editing this file by setting the
# repository variables COMMITTED_API_URL and COMMITTED_GRADIO_URL.

on:
  schedule:
    - cron: '23 */6 * * *' # 00:23, 06:23, 12:23, 18:23 UTC
  workflow_dispatch:

# Never let two warm-up runs overlap.
concurrency:
  group: warm-committed-space
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    env:
      BASE: ${{ vars.COMMITTED_API_URL || 'https://marzoukbaig14-committed-api.hf.space' }}
      GRADIO: ${{ vars.COMMITTED_GRADIO_URL || 'https://marzoukbaig14-committed-demo.hf.space' }}
    steps:
      - name: Ping /health (wake the FastAPI Space, reset its idle timer)
        run: |
          echo "GET $BASE/health"
          curl -sS --max-time 120 --retry 3 --retry-all-errors --retry-delay 10 \
            -w '\n-> HTTP %{http_code} in %{time_total}s\n' \
            "$BASE/health" || echo "health ping failed (continuing)"

      - name: Warm the FastAPI Space (both models)
        run: |
          set -u
          DIFF='@@ -1,3 +1,4 @@\n def add(a, b):\n-    return a + b\n+    return a + b  # keep-warm ping\n'
          warmed=0
          for model in 1.7b 0.6b; do
            echo "== warming model: $model =="
            if curl -sS --max-time 180 --retry 2 --retry-all-errors --retry-delay 15 \
                 -w '\n-> HTTP %{http_code} in %{time_total}s\n' \
                 -X POST "$BASE/generate" \
                 -H 'Content-Type: application/json' \
                 -d "{\"diff\":\"$DIFF\",\"model\":\"$model\"}"; then
              warmed=$((warmed + 1))
            else
              echo "!! $model warm failed"
            fi
          done
          echo "FastAPI warmed $warmed/2 models"
          # Succeed if at least one model responded; fail (and notify) only when
          # the Space is completely unreachable, so a single slow cold boot does
          # not spam failure emails.
          test "$warmed" -ge 1

      - name: Warm the Gradio demo Space (both models)
        # Best-effort: the portfolio-wired FastAPI Space above is the primary
        # signal, so a transient Gradio hiccup should not fail the whole run.
        continue-on-error: true
        run: |
          set -u
          # Gradio warms the default (1.7b) at container start but loads 0.6b
          # lazily on first use, so a plain GET won't keep 0.6b hot. Run a real
          # generation on BOTH via Gradio's two-step call API: POST submits and
          # returns an event_id, then GET streams the result (which drives the
          # job to completion). api_prefix is /gradio_api on Gradio 5/6.
          DIFF='diff --git a/x.py b/x.py\n--- a/x.py\n+++ b/x.py\n@@ -1 +1 @@\n-def add(a,b): return a+b\n+def add(a, b): return a + b\n'
          warmed=0
          for model in 1.7b 0.6b; do
            echo "== gradio warm: $model =="
            eid=$(curl -sS --max-time 60 -X POST "$GRADIO/gradio_api/call/commit_message" \
                    -H 'Content-Type: application/json' \
                    -d "{\"data\": [\"$DIFF\", \"$model\"]}" | jq -r '.event_id // empty')
            if [ -z "$eid" ]; then echo "  submit failed for $model"; continue; fi
            if curl -sS --max-time 200 -N "$GRADIO/gradio_api/call/commit_message/$eid" \
                 -w '\n  -> HTTP %{http_code} in %{time_total}s\n'; then
              warmed=$((warmed + 1))
            else
              echo "  stream failed for $model"
            fi
          done
          echo "Gradio warmed $warmed/2 models"
