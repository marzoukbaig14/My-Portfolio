name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      # Build with the demo route enabled so the whole app is exercised.
      # No backend URL is needed: the demo falls back to the bundled mock.
      - run: npm run build
        env:
          NEXT_PUBLIC_COMMITTED_ENABLED: 'true'
